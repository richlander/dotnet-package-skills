# Metadata for the MCP-delivery experiment unit (multi-package triage scenario).
# Like system-commandline-mcp this unit ships NO AGENTS.md: it only registers the
# get_package_context MCP server (see plugin.json + ../_mcp/grounding_mcp.py), which
# serves grounding for ALL packages in the index by name.
#
# This scenario references THREE grounded packages (System.CommandLine + two
# distractors) but only System.CommandLine's guidance is load-bearing. It measures
# whether a cheap summary channel (progressive gate) lets the agent rule out the
# distractors without paying to pull their full bodies (single-tool gate).
name: multi-package-mcp
package: System.CommandLine
description: >-
  Inert shell unit for the MCP delivery environment (multi-package triage). Measures
  whether an agent, facing several grounded packages of which only one is relevant,
  retrieves only the load-bearing body — and how the single-tool vs progressive
  (summary + full) tool shape affects retrieval cost. Not a content unit.
