        expected_std_output_matches: '(?=[\s\S]*"1":\s*"a")(?=[\s\S]*one=a)'
        command_timeout: 120
    rubric:
      - "Serializes non-string dictionary keys"
      - "Round-trips the integer-keyed dictionary"
    timeout: 900

  - name: "J20: property order"
    prompt: |
      In Program.cs, define a type declaring `Apple=1` before `Zebra=2` but use `[JsonPropertyOrder]` so `Zebra` serializes BEFORE `Apple`. Serialize and print the JSON. Build and run to confirm.
    setup:
