      In Program.cs (targeting .NET 11), write `{}` to a `Utf8JsonWriter` over one buffer, then use `Reset` to point the SAME writer at a second buffer and write the boolean `true`. Print the second buffer's text (expect `true`). Build and run to confirm.
    setup:
      files:
        - { path: App.csproj, source: fixtures/j43-writer-reset/App.csproj }
        - { path: Program.cs, source: fixtures/j43-writer-reset/Program.cs }
    reject_tools: [web_search, web_fetch]
    assertions:
      - { type: run_command_and_assert, command_to_run: "dotnet", command_arguments: "build", expected_exit_code: 0, command_timeout: 600 }
      - type: run_command_and_assert
        command_to_run: "dotnet"
        command_arguments: "run --no-build --"
        expected_exit_code: 0
        expected_std_output_matches: '\btrue\b'
        command_timeout: 120
    rubric:
      - ".NET 11: Utf8JsonWriter.Reset reuses the writer"
      - "Second buffer receives the new content"
    timeout: 900

  - name: "J44: migrate triple"
    prompt: |
      In Program.cs, migrate a Newtonsoft.Json setup to System.Text.Json that simultaneously (a) omits null-valued properties, (b) serializes enums as strings, and (c) uses camelCase property names. Serialize a `Job{Title="build", Status=JobStatus.Done, Notes=null}` where `enum JobStatus{Queued,Done}`. Print the JSON (expect `{"title":"build","status":"Done"}`). Build and run to confirm.
    setup:
      files:
        - { path: App.csproj, source: fixtures/j44-migrate-triple/App.csproj }
        - { path: Program.cs, source: fixtures/j44-migrate-triple/Program.cs }
    reject_tools: [web_search, web_fetch]
    assertions:
      - { type: run_command_and_assert, command_to_run: "dotnet", command_arguments: "build", expected_exit_code: 0, command_timeout: 600 }
      - type: run_command_and_assert
        command_to_run: "dotnet"
        command_arguments: "run --no-build --"
        expected_exit_code: 0
        expected_std_output_matches: '(?=[\s\S]*"title":\s*"build")(?=[\s\S]*"status":\s*"Done")(?![\s\S]*[Nn]otes)'
        command_timeout: 120
    rubric:
      - "Combines DefaultIgnoreCondition.WhenWritingNull + JsonStringEnumConverter + CamelCase policy"
      - "All three behaviors hold at once"
    timeout: 900

  - name: "J45: migrate fields ci"
    prompt: |
      In Program.cs, migrate a Newtonsoft round-trip to System.Text.Json that needs BOTH case-insensitive property matching AND public field serialization. Deserialize `{"name":"demo","count":3}` into a type whose public FIELDS are `Name` and `Count` (PascalCase), then print `name=<Name> count=<Count>`. Build and run to confirm.
    setup:
      files:
        - { path: App.csproj, source: fixtures/j45-migrate-fields-ci/App.csproj }
        - { path: Program.cs, source: fixtures/j45-migrate-fields-ci/Program.cs }
    reject_tools: [web_search, web_fetch]
    assertions:
      - { type: run_command_and_assert, command_to_run: "dotnet", command_arguments: "build", expected_exit_code: 0, command_timeout: 600 }
      - type: run_command_and_assert
        command_to_run: "dotnet"
        command_arguments: "run --no-build --"
        expected_exit_code: 0
        expected_std_output_matches: 'name=demo\s+count=3'
        command_timeout: 120
    rubric:
      - "Sets PropertyNameCaseInsensitive=true and IncludeFields=true (or [JsonInclude])"
      - "Reads camelCase JSON into PascalCase public fields"
    timeout: 900

  - name: "J46: migrate names null"
    prompt: |
      In Program.cs, migrate Newtonsoft `[JsonProperty("user_id")]` + `NullValueHandling.Ignore` to System.Text.Json on a `User{UserId(string), Nickname(string?)}`. Serialize `User{UserId="u1", Nickname=null}` so the JSON has `user_id` and omits the null Nickname. Print the JSON (expect `{"user_id":"u1"}`). Build and run to confirm.
    setup:
      files:
        - { path: App.csproj, source: fixtures/j46-migrate-names-null/App.csproj }
        - { path: Program.cs, source: fixtures/j46-migrate-names-null/Program.cs }
    reject_tools: [web_search, web_fetch]
    assertions:
      - { type: run_command_and_assert, command_to_run: "dotnet", command_arguments: "build", expected_exit_code: 0, command_timeout: 600 }
      - type: run_command_and_assert
        command_to_run: "dotnet"
        command_arguments: "run --no-build --"
        expected_exit_code: 0
        expected_std_output_matches: '(?=[\s\S]*"user_id":\s*"u1")(?![\s\S]*[Nn]ickname)'
        command_timeout: 120
    rubric:
      - "Maps [JsonProperty] to [JsonPropertyName] and NullValueHandling.Ignore to WhenWritingNull"
      - "Both the rename and the omission apply"
    timeout: 900

  - name: "J47: node pipeline"
    prompt: |
      In Program.cs, build a System.Text.Json pipeline: parse `{"userName":"ada","age":30,"temp":null}` into a `JsonObject`, remove the null `temp` property, add a `"active":true` property, and print the resulting JSON via `ToJsonString()` (expect it to contain `userName`, `age`, and `active` but not `temp`). Build and run to confirm.
    setup:
      files:
        - { path: App.csproj, source: fixtures/j47-node-pipeline/App.csproj }
        - { path: Program.cs, source: fixtures/j47-node-pipeline/Program.cs }
    reject_tools: [web_search, web_fetch]
