config:
  max_parallel_scenarios: 1

# =============================================================================
# System.Text.Json — MM-12. A medium-major grounding packet covering the durable
# STJ migration traps documented in AGENTS.md: case-sensitive deserialization,
# ignored fields, comments/trailing commas, null omission, indentation, custom
# names, naming policies, enum strings, reference cycles, and source-generation
# for AOT-safe serialization. HYPOTHESIS: J1/J3-J11 are mostly model-resident
# greenfield tasks where grounding should be neutral/no-harm; J2 and especially
# J12 measure documented silent Newtonsoft->STJ breaks that compile cleanly but
# produce wrong data unless the agent uses the grounding guidance. Web is blocked
# so the eval reads model+repo grounding knowledge, not archaeology. All anchors
# were verified against the net10.0 target with the login dotnet SDK.
# =============================================================================

scenarios:
  - name: "J1: round-trip a record with System.Text.Json"
    prompt: |
      In Program.cs, create a `WeatherReport` record with `City` and `TemperatureF`,
      serialize an instance for Seattle at 72F with System.Text.Json, deserialize it
      back, and print `city=<City> temp=<TemperatureF>` from the deserialized value.
      Build and run to confirm.
    setup:
      files:
        - { path: App.csproj, source: fixtures/j1-roundtrip/App.csproj }
        - { path: Program.cs, source: fixtures/j1-roundtrip/Program.cs }
    reject_tools: [web_search, web_fetch]
    assertions:
      - { type: run_command_and_assert, command_to_run: "dotnet", command_arguments: "build", expected_exit_code: 0, command_timeout: 600 }
      - type: run_command_and_assert
        command_to_run: "dotnet"
        command_arguments: "run --no-build --"
        expected_exit_code: 0
        expected_std_output_matches: 'city=Seattle\s+temp=72'
        command_timeout: 120
    rubric:
      - "Uses System.Text.Json.JsonSerializer.Serialize and Deserialize<T>"
      - "Proves the round trip by printing values from the deserialized record"
    timeout: 900

  - name: "J2: deserialize camelCase JSON into PascalCase properties"
    prompt: |
      In Program.cs, deserialize this JSON into a `WorkItem` class with PascalCase
      properties `Title` and `Priority`: `{"title":"Refactor","priority":5}`.
      System.Text.Json is case-sensitive by default, so opt into case-insensitive
      matching (or web defaults). Print `title=<Title> priority=<Priority>`.
      Build and run to confirm.
    setup:
      files:
        - { path: App.csproj, source: fixtures/j2-case-insensitive/App.csproj }
        - { path: Program.cs, source: fixtures/j2-case-insensitive/Program.cs }
    reject_tools: [web_search, web_fetch]
    assertions:
      - { type: run_command_and_assert, command_to_run: "dotnet", command_arguments: "build", expected_exit_code: 0, command_timeout: 600 }
      - type: run_command_and_assert
        command_to_run: "dotnet"
        command_arguments: "run --no-build --"
        expected_exit_code: 0
        expected_std_output_matches: 'title=Refactor\s+priority=5'
        command_timeout: 120
    rubric:
      - "Uses PropertyNameCaseInsensitive = true or JsonSerializerDefaults.Web"
      - "Does not silently accept default/null values from case-sensitive deserialization"
    timeout: 900

  - name: "J3: write indented JSON"
    prompt: |
      In Program.cs, serialize a `Report` record with `Name = "Build"` and
      `Passed = true` as human-readable indented JSON, then print the JSON.
      Build and run to confirm.
    setup:
      files:
        - { path: App.csproj, source: fixtures/j3-indented/App.csproj }
        - { path: Program.cs, source: fixtures/j3-indented/Program.cs }
    reject_tools: [web_search, web_fetch]
    assertions:
      - { type: run_command_and_assert, command_to_run: "dotnet", command_arguments: "build", expected_exit_code: 0, command_timeout: 600 }
      - type: run_command_and_assert
        command_to_run: "dotnet"
        command_arguments: "run --no-build --"
        expected_exit_code: 0
        expected_std_output_matches: '(?=[\s\S]*\"Name\": \"Build\")(?=[\s\S]*\"Passed\": true)'
        command_timeout: 120
    rubric:
      - "Configures JsonSerializerOptions.WriteIndented = true"
      - "Serializes and prints JSON containing both Report properties"
    timeout: 900

  - name: "J4: omit null properties when writing JSON"
    prompt: |
      In Program.cs, serialize a person with `Name = "Ada"`, `Nickname = null`, and
      `City = "London"`. Omit null-valued properties so the output contains Name and
      City but not Nickname. Build and run to confirm.
    setup:
      files:
        - { path: App.csproj, source: fixtures/j4-omit-nulls/App.csproj }
        - { path: Program.cs, source: fixtures/j4-omit-nulls/Program.cs }
    reject_tools: [web_search, web_fetch]
    assertions:
      - { type: run_command_and_assert, command_to_run: "dotnet", command_arguments: "build", expected_exit_code: 0, command_timeout: 600 }
      - type: run_command_and_assert
        command_to_run: "dotnet"
        command_arguments: "run --no-build --"
        expected_exit_code: 0
        expected_std_output_matches: '^(?![\s\S]*\"Nickname\")(?=[\s\S]*\"Name\":\s*\"Ada\")(?=[\s\S]*\"City\":\s*\"London\")[\s\S]*$'
        command_timeout: 120
    rubric:
      - "Uses DefaultIgnoreCondition = JsonIgnoreCondition.WhenWritingNull"
      - "Does not use obsolete IgnoreNullValues; output omits Nickname"
    timeout: 900

  - name: "J5: map custom JSON property names"
    prompt: |
      In Program.cs, define a `PackageInfo` record whose C# properties are
      `PackageId` and `DownloadCount`, but whose JSON names are `package_id` and
      `download_count`. Serialize the package `Serilog` with 1234 downloads, print the
      JSON, then deserialize the same custom-name JSON and print
      `id=<PackageId> downloads=<DownloadCount>`. Build and run to confirm.
    setup:
      files:
        - { path: App.csproj, source: fixtures/j5-property-name/App.csproj }
        - { path: Program.cs, source: fixtures/j5-property-name/Program.cs }
    reject_tools: [web_search, web_fetch]
    assertions:
      - { type: run_command_and_assert, command_to_run: "dotnet", command_arguments: "build", expected_exit_code: 0, command_timeout: 600 }
      - type: run_command_and_assert
        command_to_run: "dotnet"
        command_arguments: "run --no-build --"
        expected_exit_code: 0
        expected_std_output_matches: '(?=[\s\S]*\{\"package_id\":\s*\"Serilog\",\s*\"download_count\":\s*1234\})(?=[\s\S]*id=Serilog\s+downloads=1234)'
        command_timeout: 120
    rubric:
      - "Uses System.Text.Json.Serialization.JsonPropertyName attributes"
      - "For record primary-constructor parameters, applies the attribute to the property target"
    timeout: 900

  - name: "J6: include public fields in System.Text.Json"
    prompt: |
      In Program.cs, create a `TelemetrySample` type whose data members are public
      fields `Name` and `Count`. Deserialize `{"Name":"requests","Count":3}` using
      System.Text.Json, print `name=<Name> count=<Count>`, then serialize the sample
      back to JSON. Build and run to confirm.
    setup:
      files:
        - { path: App.csproj, source: fixtures/j6-fields/App.csproj }
        - { path: Program.cs, source: fixtures/j6-fields/Program.cs }
    reject_tools: [web_search, web_fetch]
    assertions:
      - { type: run_command_and_assert, command_to_run: "dotnet", command_arguments: "build", expected_exit_code: 0, command_timeout: 600 }
      - type: run_command_and_assert
        command_to_run: "dotnet"
        command_arguments: "run --no-build --"
        expected_exit_code: 0
        expected_std_output_matches: '(?=[\s\S]*name=requests\s+count=3)(?=[\s\S]*\{\"Name\":\"requests\",\"Count\":3\})'
        command_timeout: 120
    rubric:
      - "Opts into field serialization with IncludeFields = true or JsonInclude"
      - "Does not leave public fields at default/null values"
    timeout: 900

  - name: "J7: serialize enums as strings"
    prompt: |
      In Program.cs, define `enum JobStatus { Queued, Running, Complete }` and a
      `Job` record. Configure System.Text.Json so a job with status `Complete`
      serializes as the string `"Complete"` rather than a number. Print the JSON,
      then deserialize JSON whose `Status` is the string `"Complete"` and print
      `status=<Status>`. Build and run to confirm.
    setup:
      files:
        - { path: App.csproj, source: fixtures/j7-enum-strings/App.csproj }
        - { path: Program.cs, source: fixtures/j7-enum-strings/Program.cs }
    reject_tools: [web_search, web_fetch]
    assertions:
      - { type: run_command_and_assert, command_to_run: "dotnet", command_arguments: "build", expected_exit_code: 0, command_timeout: 600 }
      - type: run_command_and_assert
        command_to_run: "dotnet"
        command_arguments: "run --no-build --"
        expected_exit_code: 0
        expected_std_output_matches: '(?=[\s\S]*\"Status\":\s*\"Complete\")(?=[\s\S]*status=Complete)'
        command_timeout: 120
    rubric:
      - "Adds JsonStringEnumConverter (generic or non-generic) to JsonSerializerOptions"
      - "Round-trips a string enum value instead of relying on numeric enum serialization"
    timeout: 900

  - name: "J8: read comments and trailing commas"
    prompt: |
      In Program.cs, read this JSON with System.Text.Json and print
      `name=<Name> enabled=<Enabled>`:
      ```jsonc
      {
        // comments are present in this config file
        "Name": "demo",
        "Enabled": true,
      }
      ```
      Configure the serializer to skip comments and allow trailing commas.
      Build and run to confirm.
    setup:
      files:
        - { path: App.csproj, source: fixtures/j8-comments-trailing/App.csproj }
        - { path: Program.cs, source: fixtures/j8-comments-trailing/Program.cs }
    reject_tools: [web_search, web_fetch]
    assertions:
      - { type: run_command_and_assert, command_to_run: "dotnet", command_arguments: "build", expected_exit_code: 0, command_timeout: 600 }
      - type: run_command_and_assert
        command_to_run: "dotnet"
        command_arguments: "run --no-build --"
        expected_exit_code: 0
        expected_std_output_matches: 'name=demo\s+enabled=True'
        command_timeout: 120
    rubric:
      - "Sets ReadCommentHandling = JsonCommentHandling.Skip"
      - "Sets AllowTrailingCommas = true"
    timeout: 900

  - name: "J9: write camelCase property names"
    prompt: |
      In Program.cs, serialize a `UserProfile` record with PascalCase members
      `DisplayName = "Ada"` and `LoginCount = 5`, but write camelCase JSON names
      `displayName` and `loginCount`. Print the JSON. Build and run to confirm.
    setup:
      files:
        - { path: App.csproj, source: fixtures/j9-camelcase-output/App.csproj }
        - { path: Program.cs, source: fixtures/j9-camelcase-output/Program.cs }
    reject_tools: [web_search, web_fetch]
    assertions:
      - { type: run_command_and_assert, command_to_run: "dotnet", command_arguments: "build", expected_exit_code: 0, command_timeout: 600 }
      - type: run_command_and_assert
        command_to_run: "dotnet"
        command_arguments: "run --no-build --"
        expected_exit_code: 0
        expected_std_output_matches: '(?=[\s\S]*\"displayName\":\s*\"Ada\")(?=[\s\S]*\"loginCount\":\s*5)'
        command_timeout: 120
    rubric:
      - "Sets JsonSerializerOptions.PropertyNamingPolicy = JsonNamingPolicy.CamelCase"
      - "Does not rename the C# members just to affect JSON output"
    timeout: 900

  - name: "J10: ignore reference cycles"
    prompt: |
      In Program.cs, create a `Node` object with `Name = "root"` whose `Next` property
      points back to itself. Serialize it with System.Text.Json without throwing a
      cycle exception, print the JSON, then print `serialized self cycle`.
      Build and run to confirm.
    setup:
      files:
        - { path: App.csproj, source: fixtures/j10-ignore-cycles/App.csproj }
        - { path: Program.cs, source: fixtures/j10-ignore-cycles/Program.cs }
    reject_tools: [web_search, web_fetch]
    assertions:
      - { type: run_command_and_assert, command_to_run: "dotnet", command_arguments: "build", expected_exit_code: 0, command_timeout: 600 }
      - type: run_command_and_assert
        command_to_run: "dotnet"
        command_arguments: "run --no-build --"
        expected_exit_code: 0
        expected_std_output_matches: '(?=[\s\S]*\{\"Name\":\"root\",\"Next\":null\})(?=[\s\S]*serialized self cycle)'
        command_timeout: 120
    rubric:
      - "Configures JsonSerializerOptions.ReferenceHandler = ReferenceHandler.IgnoreCycles"
      - "Serializes the self-referencing graph without removing the cycle from the object model"
    timeout: 900

  - name: "J11: use source-generation JsonSerializerContext"
    prompt: |
      In Program.cs, serialize and deserialize a `BuildRecord` using a partial
      `JsonSerializerContext` source-generation type, not reflection-based generic
      serializer calls. Configure the context for camelCase JSON and case-insensitive
      reads. Serialize `new BuildRecord("agent", 2)`, deserialize
      `{"name":"agent","attempts":2}` via the generated type info, and print the JSON
      plus `context roundtrip: <Name>/<Attempts>`. Build and run to confirm.
    setup:
      files:
        - { path: App.csproj, source: fixtures/j11-source-generation/App.csproj }
        - { path: Program.cs, source: fixtures/j11-source-generation/Program.cs }
    reject_tools: [web_search, web_fetch]
    assertions:
      - { type: run_command_and_assert, command_to_run: "dotnet", command_arguments: "build", expected_exit_code: 0, command_timeout: 600 }
      - type: run_command_and_assert
        command_to_run: "dotnet"
        command_arguments: "run --no-build --"
        expected_exit_code: 0
        expected_std_output_matches: '(?=[\s\S]*\{\"name\":\"agent\",\"attempts\":2\})(?=[\s\S]*context roundtrip:\s*agent/2)'
        command_timeout: 120
    rubric:
      - "Defines a partial JsonSerializerContext with JsonSerializable for the root type"
      - "Passes AppJsonContext.Default.BuildRecord (or equivalent generated type info/resolver) to JsonSerializer"
      - "Uses JsonSourceGenerationOptions for camelCase/case-insensitive behavior"
    timeout: 900

  - name: "J12: migrate a Newtonsoft.Json program to System.Text.Json"
    prompt: |
      This project starts as a working Newtonsoft.Json program. Migrate Program.cs to
      System.Text.Json and remove the Newtonsoft.Json package reference from App.csproj.
      Preserve the exact behavior: `[JsonProperty]` names become STJ property-name
      attributes, `NullValueHandling.Ignore` becomes the STJ null-ignore option,
      `Formatting.Indented` becomes indented STJ output, the public `PackageId` field
      must still be included, and the camelCase `ownerName` input must still populate
      PascalCase `OwnerName` despite STJ's case-sensitive default. Build and run to
      confirm the same printed output.
    setup:
      files:
        - { path: App.csproj, source: fixtures/j12-newtonsoft-migration/App.csproj }
        - { path: Program.cs, source: fixtures/j12-newtonsoft-migration/Program.cs }
    reject_tools: [web_search, web_fetch]
    assertions:
      - { type: run_command_and_assert, command_to_run: "dotnet", command_arguments: "build", expected_exit_code: 0, command_timeout: 600 }
      - type: run_command_and_assert
        command_to_run: "dotnet"
        command_arguments: "run --no-build --"
        expected_exit_code: 0
        expected_std_output_matches: '^(?![\s\S]*\"notes\")(?![\s\S]*\"downloadCount\")(?![\s\S]*\"OwnerName\")(?=[\s\S]*\"packageId\": \"System\.Text\.Json\")(?=[\s\S]*package=System\.Text\.Json\s+owner=runtime\s+downloads=12345)'
        command_timeout: 120
      - type: file_not_contains
        path: "Program.cs"
        value: "Newtonsoft.Json"
      - type: file_not_contains
        path: "Program.cs"
        value: "JsonConvert"
      - type: file_not_contains
        path: "App.csproj"
        value: "Newtonsoft.Json"
    rubric:
      - "Replaces JsonConvert.SerializeObject/DeserializeObject with System.Text.Json.JsonSerializer"
      - "Maps JsonSerializerSettings to JsonSerializerOptions, including WriteIndented and WhenWritingNull"
      - "Maps [JsonProperty] to [JsonPropertyName] and opts into public fields with IncludeFields or JsonInclude"
      - "Handles STJ case sensitivity for camelCase ownerName input with PropertyNameCaseInsensitive or equivalent"
      - "Removes the Newtonsoft.Json dependency"
    timeout: 900

  - name: "J13: custom converter"
    prompt: |
      In Program.cs, define a `Temperature` struct wrapping an int and a custom `JsonConverter<Temperature>` that writes it as a JSON string like "72F" and reads that form back. Serialize `Temperature(72)` and print the JSON, then deserialize "72F" and print `temp=<value>`. Build and run to confirm.
    setup:
      files:
        - { path: App.csproj, source: fixtures/j13-custom-converter/App.csproj }
        - { path: Program.cs, source: fixtures/j13-custom-converter/Program.cs }
    reject_tools: [web_search, web_fetch]
    assertions:
      - { type: run_command_and_assert, command_to_run: "dotnet", command_arguments: "build", expected_exit_code: 0, command_timeout: 600 }
      - type: run_command_and_assert
        command_to_run: "dotnet"
        command_arguments: "run --no-build --"
        expected_exit_code: 0
        expected_std_output_matches: '(?=[\s\S]*"72F")(?=[\s\S]*temp=72)'
        command_timeout: 120
    rubric:
      - "Registers a JsonConverter<Temperature> via JsonSerializerOptions.Converters or [JsonConverter]"
      - "Round-trips the custom string form"
    timeout: 900

  - name: "J14: polymorphic"
    prompt: |
      In Program.cs, define an abstract `Shape` annotated with `[JsonPolymorphic(TypeDiscriminatorPropertyName="kind")]` and `[JsonDerivedType(typeof(Circle),"circle")]`, where `Circle` has an int `R`. Serialize a `Circle{R=3}` declared as `Shape` and print the JSON. Build and run to confirm.
    setup:
      files:
        - { path: App.csproj, source: fixtures/j14-polymorphic/App.csproj }
        - { path: Program.cs, source: fixtures/j14-polymorphic/Program.cs }
    reject_tools: [web_search, web_fetch]
    assertions:
      - { type: run_command_and_assert, command_to_run: "dotnet", command_arguments: "build", expected_exit_code: 0, command_timeout: 600 }
      - type: run_command_and_assert
        command_to_run: "dotnet"
        command_arguments: "run --no-build --"
        expected_exit_code: 0
        expected_std_output_matches: '(?=[\s\S]*"kind":\s*"circle")(?=[\s\S]*"R":\s*3)'
        command_timeout: 120
    rubric:
      - "Uses [JsonPolymorphic]/[JsonDerivedType] with a type discriminator"
      - "Emits the discriminator plus derived members"
    timeout: 900

  - name: "J15: extension data"
    prompt: |
      In Program.cs, define a `Bag` with a string `Name` and a `[JsonExtensionData]` `Dictionary<string,JsonElement>`. Deserialize `{"Name":"x","extra1":9}`, then re-serialize the object. Print `name=<Name> extra1=<extra1>` and the re-serialized JSON. Build and run to confirm.
    setup:
      files:
        - { path: App.csproj, source: fixtures/j15-extension-data/App.csproj }
        - { path: Program.cs, source: fixtures/j15-extension-data/Program.cs }
    reject_tools: [web_search, web_fetch]
    assertions:
      - { type: run_command_and_assert, command_to_run: "dotnet", command_arguments: "build", expected_exit_code: 0, command_timeout: 600 }
      - type: run_command_and_assert
        command_to_run: "dotnet"
        command_arguments: "run --no-build --"
        expected_exit_code: 0
        expected_std_output_matches: '(?=[\s\S]*name=x\s+extra1=9)(?=[\s\S]*"extra1":\s*9)'
        command_timeout: 120
    rubric:
      - "Uses [JsonExtensionData] to capture unmapped members"
      - "Round-trips the overflow data"
    timeout: 900

  - name: "J16: number from string"
    prompt: |
      In Program.cs, configure System.Text.Json with `NumberHandling = JsonNumberHandling.AllowReadingFromString` and deserialize `{"Count":"42"}` into a type with an int `Count`. Print `count=<Count>`. Build and run to confirm.
    setup:
      files:
        - { path: App.csproj, source: fixtures/j16-number-from-string/App.csproj }
        - { path: Program.cs, source: fixtures/j16-number-from-string/Program.cs }
    reject_tools: [web_search, web_fetch]
    assertions:
      - { type: run_command_and_assert, command_to_run: "dotnet", command_arguments: "build", expected_exit_code: 0, command_timeout: 600 }
      - type: run_command_and_assert
        command_to_run: "dotnet"
        command_arguments: "run --no-build --"
        expected_exit_code: 0
        expected_std_output_matches: 'count=42'
        command_timeout: 120
    rubric:
      - "Sets JsonNumberHandling.AllowReadingFromString"
      - "Reads the quoted number as an int"
    timeout: 900

  - name: "J17: sourcegen options"
    prompt: |
      In Program.cs, define a `Server` record with a `HostName` and a partial `JsonSerializerContext` annotated `[JsonSourceGenerationOptions(PropertyNamingPolicy=JsonKnownNamingPolicy.CamelCase)]` and `[JsonSerializable(typeof(Server))]`. Serialize `new Server("web01")` through the context and print the JSON (property must be camelCase). Build and run to confirm.
    setup:
      files:
        - { path: App.csproj, source: fixtures/j17-sourcegen-options/App.csproj }
        - { path: Program.cs, source: fixtures/j17-sourcegen-options/Program.cs }
    reject_tools: [web_search, web_fetch]
    assertions:
