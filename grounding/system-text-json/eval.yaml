        command_arguments: "run --no-build --"
        expected_exit_code: 0
        expected_std_output_matches: '"hostName":\s*"web01"'
        command_timeout: 120
    rubric:
      - "Uses a source-generated JsonSerializerContext"
      - "[JsonSourceGenerationOptions] sets camelCase naming"
    timeout: 900

  - name: "J18: record ctor"
    prompt: |
      In Program.cs, define a `Point` record with a primary constructor `(int X, int Y)` marked `[JsonConstructor]`. Deserialize `{"X":3,"Y":4}` and print `x=<X> y=<Y>`. Build and run to confirm.
