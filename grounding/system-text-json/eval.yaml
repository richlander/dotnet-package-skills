  - name: "J48: capstone migration"
    prompt: |
      In Program.cs, perform a capstone Newtonsoft.Json -> System.Text.Json migration of a settings serializer that uses FOUR behaviors together: camelCase names, string enums, omit-null, and case-insensitive reads. Round-trip a `Profile{DisplayName="Ada", Tier=Plan.Pro, Bio=null}` where `enum Plan{Free,Pro}`: serialize it (expect `{"displayName":"Ada","tier":"Pro"}`), then deserialize that JSON back and print `name=<DisplayName> tier=<Tier>`. Build and run to confirm.
    setup:
      files:
        - { path: App.csproj, source: fixtures/j48-capstone-migration/App.csproj }
        - { path: Program.cs, source: fixtures/j48-capstone-migration/Program.cs }
    reject_tools: [web_search, web_fetch]
    assertions:
      - { type: run_command_and_assert, command_to_run: "dotnet", command_arguments: "build", expected_exit_code: 0, command_timeout: 600 }
      - type: run_command_and_assert
        command_to_run: "dotnet"
        command_arguments: "run --no-build --"
        expected_exit_code: 0
        expected_std_output_matches: '(?=[\s\S]*"displayName":\s*"Ada")(?=[\s\S]*"tier":\s*"Pro")(?![\s\S]*[Bb]io)(?=[\s\S]*name=Ada\s+tier=Pro)'
        command_timeout: 120
    rubric:
      - "Composes camelCase + string enums + WhenWritingNull + case-insensitive in one options object"
      - "Round-trips cleanly with all four behaviors"
    timeout: 900
