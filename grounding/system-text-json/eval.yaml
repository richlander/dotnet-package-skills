        command_arguments: "run --no-build --"
        expected_exit_code: 0
        expected_std_output_matches: 'x=3\s+y=4'
        command_timeout: 120
    rubric:
      - "Deserializes into a parameterized record constructor"
      - "[JsonConstructor] selects the ctor"
    timeout: 900

  - name: "J19: int dict keys"
    prompt: |
      In Program.cs, serialize a `Dictionary<int,string>` equal to `{1:"a",2:"b"}` with System.Text.Json and print the JSON, then deserialize it back and print `one=<value for key 1>`. Build and run to confirm.
