# Delivery-channel unit for the custom MCP (Markout task).
# Registers the C# grounding MCP server (grounding mcp). The gate is selected by the
# GROUNDING_GATE env var (resident_index for the skill-oriented mode). Its
# get_package_context resolves "Markout" -> grounding/markout/AGENTS.md (the
# curated grounding), independent of what ships in the package cache.
# Ships NO AGENTS.md itself (inert shell); content is served on demand by the tool.
name: markout-custommcp
package: Markout
description: >-
  Inert shell unit that attaches our controlled grounding MCP server to the Markout M1
  report task. Measures the skill-oriented delivery (resident index + one body tool),
  serving curated Markout grounding on demand, against a raw baseline. Not a content unit.
