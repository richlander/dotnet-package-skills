  - name: "C23: migrate a beta subcommand program to GA/3.x"
    prompt: |
      Program.cs is a System.CommandLine 2.0.0-beta program (subcommands + a global
      option) that does NOT compile against the current GA / 3.x API. Migrate it so it
      builds and runs, preserving behavior: running `add 3` must print `added 3`. Remove
      the beta invocation/binding stack. Build and run to confirm.
    setup:
      files:
        - { path: App.csproj, source: fixtures/c23-migrate-subcommands/App.csproj }
        - { path: Program.cs, source: fixtures/c23-migrate-subcommands/Program.cs }
    reject_tools: [web_search, web_fetch]
    assertions:
      - { type: run_command_and_assert, command_to_run: "dotnet", command_arguments: "build", expected_exit_code: 0, command_timeout: 600 }
      - type: run_command_and_assert
        command_to_run: "dotnet"
        command_arguments: "run --no-build -- add 3"
        expected_exit_code: 0
        expected_std_output_matches: 'added 3'
        command_timeout: 120
    rubric:
      - "AddArgument -> Arguments.Add; AddCommand -> Subcommands.Add; AddGlobalOption -> Recursive = true + Options.Add"
      - "SetHandler -> SetAction reading values by identity; InvokeAsync(args) -> Parse(args).InvokeAsync()"
    timeout: 900

  - name: "C24: capstone — a deploy command"
    prompt: |
      In Program.cs, build a `deploy` subcommand with: a required `--env` option
      constrained to `dev` or `prod`; a `--replicas` integer option defaulting to 1; and
      an asynchronous action that prints `deploy env=<env> replicas=<replicas>`. Running
      `deploy --env prod --replicas 3` prints `deploy env=prod replicas=3`; running
      `deploy` with no `--env` must fail with a non-zero exit code. Build and run to confirm.
    setup:
      files:
        - { path: App.csproj, source: fixtures/c24-capstone/App.csproj }
        - { path: Program.cs, source: fixtures/c24-capstone/Program.cs }
    reject_tools: [web_search, web_fetch]
    assertions:
      - { type: run_command_and_assert, command_to_run: "dotnet", command_arguments: "build", expected_exit_code: 0, command_timeout: 600 }
      - type: run_command_and_assert
        command_to_run: "dotnet"
        command_arguments: "run --no-build -- deploy --env prod --replicas 3"
        expected_exit_code: 0
        expected_std_output_matches: 'deploy env=prod replicas=3'
        command_timeout: 120
      - type: run_command_and_assert
        command_to_run: "dotnet"
        command_arguments: "run --no-build -- deploy --env prod"
        expected_exit_code: 0
        expected_std_output_matches: 'deploy env=prod replicas=1'
        command_timeout: 120
      - type: run_command_and_assert
        command_to_run: "dotnet"
        command_arguments: "run --no-build -- deploy"
        expected_exit_code: 1
        expected_std_error_matches: 'is required'
        command_timeout: 120
    rubric:
      - "Combines Required + AcceptOnlyFromAmong + DefaultValueFactory on a subcommand with an async action"
      - "Uses only the current GA/3.x API (no SetHandler/AddOption/getDefaultValue:/IsRequired)"
    timeout: 900
