  - name: "C22: nested subcommands with a recursive option"
    prompt: |
      In Program.cs, build nested subcommands: root -> `db` -> `migrate`. Add a recursive
      `--verbose` option on the root. Running `db migrate --verbose` should print
      `migrate verbose=True`. Build and run to confirm.
