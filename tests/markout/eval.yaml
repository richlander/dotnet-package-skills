  # CT1 (q5) — AutoFields = false (suppress the scalar field table).
  - name: "CT1: suppress auto fields"
    prompt: |
      This console project references a source-generated .NET serializer library that projects
      annotated objects into Markdown (see the package reference in the .csproj). Program.cs holds
      scan metadata and findings in plain objects. Using that library, print a GitHub-flavored
      Markdown report with an H1 title and a "## Findings" table — but do NOT render the scalar
      metadata as a field table (suppress auto fields so only the section shows). Produce the output
      through the library's serializer. Build and run to confirm.
    setup:
      files:
        - { path: Report.csproj, source: fixtures/autofields/Report.csproj }
        - { path: Program.cs, source: fixtures/autofields/Program.cs }
    reject_tools: [web_search, web_fetch]
    assertions:
      - { type: run_command_and_assert, command_to_run: "dotnet", command_arguments: "build", expected_exit_code: 0, command_timeout: 600 }
      - { type: file_contains, path: "Program.cs", value: "AutoFields" }
      - type: run_command_and_assert
        command_to_run: "dotnet"
        command_arguments: "run --no-build"
        expected_exit_code: 0
        expected_std_output_matches: "(?=[\\s\\S]*# Audit)(?=[\\s\\S]*## Findings)(?![\\s\\S]*Generated By)"
        command_timeout: 120
    rubric:
      - "Sets [MarkoutSerializable(AutoFields = false)] so scalar metadata is not rendered as a field table; the section still renders"
    timeout: 900

