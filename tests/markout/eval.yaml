        - an H1 title taken from the name
        - the summary rendered as an intro paragraph directly below the heading (NOT as a
          field row in the table)
        - a two-column field table of the remaining values (version, status)
      Produce the output through that library's serializer (do not hand-write the Markdown
      strings). Build and run the project to confirm it prints the expected report.
    setup:
      files:
        - path: Report.csproj
          source: fixtures/intro/Report.csproj
        - path: Program.cs
          source: fixtures/intro/Program.cs
    reject_tools:
      - web_search
      - web_fetch
    assertions:
      - type: run_command_and_assert
        command_to_run: "dotnet"
        command_arguments: "build"
        expected_exit_code: 0
        command_timeout: 600
      - type: file_contains
        path: "Program.cs"
        value: "MarkoutSerializer.Serialize"
      - type: run_command_and_assert
        command_to_run: "dotnet"
        command_arguments: "run --no-build"
        expected_exit_code: 0
        expected_std_output_matches: "(?=[\\s\\S]*# Inventory API)(?=[\\s\\S]*Read-only catalog service backed by Postgres\\.)(?=[\\s\\S]*\\| Version \\| 2\\.3\\.0 \\|)(?![\\s\\S]*\\| Summary \\|)"
        command_timeout: 120
    rubric:
      - "Uses [MarkoutSerializable(TitleProperty = ..., DescriptionProperty = ...)] so the summary renders as a paragraph, not a field"
      - "The summary does NOT appear as a table row (DescriptionProperty excludes it from the field list automatically)"
      - "Registers the type on a partial MarkoutSerializerContext and serializes through it"
      - "The project builds and prints the report; does not hand-write Markdown strings"
    timeout: 900

  # MM5 (q15) — built-in Callout shape at several severities. Each maps to a GitHub alert
  # block ("> [!WARNING]" etc.); callouts must be marked [MarkoutIgnoreInTable].
  - name: "MM5: alerts at several severities via the callout shape"
