        - three alert callouts carrying the messages: a Warning, a Caution, and a Note
      Use the library's built-in callout shape for the alerts (do not hand-write the alert
      syntax). Build and run the project to confirm it prints the report.
    setup:
      files:
        - path: Report.csproj
          source: fixtures/callouts/Report.csproj
        - path: Program.cs
          source: fixtures/callouts/Program.cs
    reject_tools:
      - web_search
      - web_fetch
    assertions:
      - type: run_command_and_assert
        command_to_run: "dotnet"
        command_arguments: "build"
        expected_exit_code: 0
        command_timeout: 600
      - type: file_contains
        path: "Program.cs"
        value: "Callout"
      - type: run_command_and_assert
        command_to_run: "dotnet"
        command_arguments: "run --no-build"
        expected_exit_code: 0
        expected_std_output_matches: "(?=[\\s\\S]*# Deploy Status)(?=[\\s\\S]*> \\[!WARNING\\])(?=[\\s\\S]*Disk space low)(?=[\\s\\S]*> \\[!CAUTION\\])(?=[\\s\\S]*> \\[!NOTE\\])"
        command_timeout: 120
    rubric:
      - "Uses the built-in Callout shape with CalloutSeverity.Warning / .Caution / .Note for the three alerts"
      - "Marks the callout properties with [MarkoutIgnoreInTable] so they are not mistreated as table columns"
      - "Registers the type on a partial MarkoutSerializerContext and serializes through it"
      - "The project builds and prints GitHub alert blocks; does not hand-write the alert syntax"
    timeout: 900

