# Markout — Missing Manual scheme (MM-6): the everyday-tasks floor (rungs 0–1).
# This is the 6-question MM subset of the 24-question Complete Textbook exam.
# Question ids (see eng tracking markout_q): 1, 2, 3, 4, 15, 16.
# Each scenario: a web-blocked agent must drive output THROUGH Markout (no hand-written
# Markdown), with a build gate + a run-output regex that only correct Markout usage yields.
config:
  max_parallel_scenarios: 1

scenarios:
  # MM1 (q1) — single object -> H1 + field table. The core pattern at its simplest:
  # [MarkoutSerializable(TitleProperty)] -> H1, scalars -> a "| Field | Value |" table,
  # serialized through a registered MarkoutSerializerContext.
  - name: "MM1: single object as an H1 + field table"
    prompt: |
      This console project references a source-generated .NET serializer library that
      projects annotated objects into Markdown (see the package reference in the .csproj).
      Program.cs holds a service status in plain values. Using that library, print a
      GitHub-flavored Markdown report to the console with:
        - an H1 title taken from the service name
        - a two-column field table of the remaining values (environment, version, replicas)
      Produce the output through that library's serializer (do not hand-write the Markdown
      strings). Build and run the project to confirm it prints the expected report.
    setup:
      files:
        - path: Report.csproj
          source: fixtures/fields/Report.csproj
        - path: Program.cs
          source: fixtures/fields/Program.cs
    reject_tools:
      - web_search
      - web_fetch
    assertions:
      - type: run_command_and_assert
        command_to_run: "dotnet"
        command_arguments: "build"
        expected_exit_code: 0
        command_timeout: 600
      - type: file_contains
        path: "Program.cs"
        value: "MarkoutSerializer.Serialize"
      - type: run_command_and_assert
        command_to_run: "dotnet"
        command_arguments: "run --no-build"
        expected_exit_code: 0
        expected_std_output_matches: "(?=[\\s\\S]*# Cache Service)(?=[\\s\\S]*\\| Version \\| 2\\.3\\.0 \\|)(?=[\\s\\S]*\\| Replicas \\| 3 \\|)"
        command_timeout: 120
    rubric:
      - "Annotates a model with [MarkoutSerializable(TitleProperty = ...)] so the name renders as the H1"
      - "Renders the scalar properties as a two-column field table (the title property is excluded automatically)"
      - "Registers the type via [MarkoutContext(typeof(T))] on a partial MarkoutSerializerContext and serializes through it"
      - "The project builds and prints the report; does not hand-write Markdown strings"
    timeout: 900

  # MM2 (q2) — the #1 trap: no reflection fallback. Serialize a List<T> to a table; the
  # naive Serialize(obj) does not compile (every overload needs a MarkoutSerializerContext).
  - name: "MM2: serialize a list to a Markdown table"
    prompt: |
      This console project references a source-generated .NET serializer library that
      projects annotated objects into Markdown (see the package reference in the .csproj).
      Program.cs holds a list of NuGet packages in plain objects. Using that library,
      print a GitHub-flavored Markdown table of the packages (one row per package, with
      the package name and version) to the console. Produce the output through that
      library's serializer (do not hand-write the Markdown strings). Build and run the
      project to confirm it prints the expected table.
    setup:
      files:
        - path: Report.csproj
          source: fixtures/packages/Report.csproj
        - path: Program.cs
          source: fixtures/packages/Program.cs
    reject_tools:
      - web_search
      - web_fetch
    assertions:
      - type: run_command_and_assert
        command_to_run: "dotnet"
        command_arguments: "build"
        expected_exit_code: 0
        command_timeout: 600
      - type: file_contains
        path: "Program.cs"
        value: "MarkoutSerializer.Serialize"
      - type: run_command_and_assert
        command_to_run: "dotnet"
        command_arguments: "run --no-build"
        expected_exit_code: 0
        expected_std_output_matches: "(?=[\\s\\S]*\\| Serilog \\| 3\\.1\\.1 \\|)(?=[\\s\\S]*\\| Polly \\| 8\\.2\\.0 \\|)(?=[\\s\\S]*\\| Newtonsoft\\.Json \\| 13\\.0\\.3 \\|)"
        command_timeout: 120
    rubric:
      - "Annotates the row model with [MarkoutSerializable] and renders the List<T> as a Markdown table"
      - "Declares a partial class deriving from MarkoutSerializerContext registering every model type via [MarkoutContext(typeof(T))]"
      - "Calls MarkoutSerializer.Serialize passing the context — Markout has NO reflection fallback, so a context-less call would not compile"
      - "The project builds and prints a table with one row per package; does not hand-write Markdown strings"
    timeout: 900

  # MM3 (q3) — register every type. A report with two different child list types; the
  # agent must put [MarkoutContext(typeof(T))] on all three (parent + both row types) or
  # a section will not serialize.
  - name: "MM3: report with two sections (register every type)"
    prompt: |
      This console project references a source-generated .NET serializer library that
      projects annotated objects into Markdown (see the package reference in the .csproj).
      Program.cs holds a release's features and bug fixes in plain objects. Using that
      library, print a GitHub-flavored Markdown report to the console with:
        - an H1 title taken from the version
        - a "## Features" section rendered as a table (columns for the title and author)
        - a "## Fixes" section rendered as a table (columns for the id and summary)
      Produce the output through that library's serializer (do not hand-write the Markdown
      strings). Build and run the project to confirm it prints the expected report.
    setup:
      files:
        - path: Report.csproj
          source: fixtures/release/Report.csproj
        - path: Program.cs
          source: fixtures/release/Program.cs
    reject_tools:
      - web_search
      - web_fetch
    assertions:
      - type: run_command_and_assert
        command_to_run: "dotnet"
        command_arguments: "build"
        expected_exit_code: 0
        command_timeout: 600
      - type: file_contains
        path: "Program.cs"
        value: "MarkoutSerializer.Serialize"
      - type: run_command_and_assert
        command_to_run: "dotnet"
        command_arguments: "run --no-build"
        expected_exit_code: 0
        expected_std_output_matches: "(?=[\\s\\S]*# v4\\.1)(?=[\\s\\S]*## Features)(?=[\\s\\S]*\\| Dark mode \\| ana \\|)(?=[\\s\\S]*## Fixes)(?=[\\s\\S]*\\| #812 \\| Fix crash on launch \\|)"
        command_timeout: 120
    rubric:
      - "Renders both lists as tables under [MarkoutSection(Name = ...)] headings (## Features, ## Fixes)"
      - "Registers EVERY model type (parent + both row types) via [MarkoutContext(typeof(T))] on one partial MarkoutSerializerContext"
      - "Serializes through the context; an unregistered row type would fail to serialize"
      - "The project builds and prints both section tables; does not hand-write Markdown strings"
    timeout: 900

  # MM4 (q4) — DescriptionProperty. The summary must render as an intro paragraph below
  # the H1, NOT as a "| Summary | ... |" field row (negative lookahead enforces this).
  - name: "MM4: intro paragraph via DescriptionProperty"
    prompt: |
      This console project references a source-generated .NET serializer library that
      projects annotated objects into Markdown (see the package reference in the .csproj).
      Program.cs holds a service catalog entry in plain values. Using that library, print a
