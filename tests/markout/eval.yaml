config:
  max_parallel_scenarios: 1

scenarios:
  # ---------------------------------------------------------------------------
  # M1 — render objects as a Markdown report with Markout (a genuinely unknown
  # package).
  #
  # Markout is a niche, source-generated .NET serializer (no meaningful presence in
  # model training data). Its API LOOKS like System.Text.Json source generation, which
  # actively misleads: there is NO reflection fallback, so every MarkoutSerializer.Serialize
  # overload requires a MarkoutSerializerContext. The correct shape is non-obvious:
  #   1. [MarkoutSerializable] on each model type (List<T> -> table, scalar -> field),
  #   2. a partial context registering every type via [MarkoutContext(typeof(T))], and
  #   3. MarkoutSerializer.Serialize(value, Console.Out, Ctx.Default).
  # A web-blocked baseline with no grounding cannot reconstruct this from intuition; it
  # hallucinates Json*-style or context-less APIs that do not compile. The grounding
  # supplies exactly the missing pattern. Gates: the project builds, Program.cs actually
  # uses Markout (not hand-written Markdown strings), and the run produces the required
  # report structure (H1 title via TitleProperty, a field table, and a "## Advisories"
  # section table).
  # ---------------------------------------------------------------------------

  - name: "M1: render a report as Markdown with Markout"
    prompt: |
      This console project references a source-generated .NET serializer library that
      projects annotated objects into Markdown (see the package reference in the .csproj).
      Program.cs holds scan data in plain objects. Using that library, print a GitHub-flavored
      Markdown report to the console with:
        - an H1 title: "Security Report"
        - a two-column field table for the summary values: Scanned (42) and Vulnerable (2)
        - a "## Advisories" section rendered as a table with columns Package, Severity, Cve,
          one row per advisory
      Produce the output through that library's serializer (do not hand-write the Markdown
      strings). Build and run the project to confirm it prints the expected report.
    setup:
      files:
        - path: SecurityReport.csproj
          source: fixtures/report/SecurityReport.csproj
        - path: Program.cs
          source: fixtures/report/Program.cs
    reject_tools:
      - web_search
      - web_fetch
    assertions:
      - type: run_command_and_assert
        command_to_run: "dotnet"
        command_arguments: "build"
        expected_exit_code: 0
        command_timeout: 600
      # The report must be produced BY Markout, not hand-written Console.WriteLine markdown.
      - type: file_contains
        path: "Program.cs"
        value: "MarkoutSerializer.Serialize"
      # Behavior gate: only correct Markout usage yields this structure — an H1 title (via
      # TitleProperty), a field table (Scanned/Vulnerable), and a "## Advisories" table.
      - type: run_command_and_assert
        command_to_run: "dotnet"
        command_arguments: "run --no-build"
        expected_exit_code: 0
        expected_std_output_matches: "(?=[\\s\\S]*# Security Report)(?=[\\s\\S]*\\| Scanned \\| 42 \\|)(?=[\\s\\S]*## Advisories)(?=[\\s\\S]*\\| Contoso\\.Data \\| Critical \\| CVE-2025-0001 \\|)"
        command_timeout: 120
    rubric:
      - "Annotates the report model(s) with [MarkoutSerializable] and renders List<T> as a table and scalars as fields"
      - "Declares a partial class deriving from MarkoutSerializerContext that registers every model type via [MarkoutContext(typeof(T))]"
      - "Calls MarkoutSerializer.Serialize(value, Console.Out, Context.Default) — passing the context, since Markout has no reflection fallback"
      - "Uses TitleProperty for the H1 and [MarkoutSection(Name = \"Advisories\")] for the section heading; does not hand-write Markdown strings"
      - "The project builds and prints the required Markdown report"
    timeout: 900
