        expected_exit_code: 0
        expected_std_output_matches: "(?=[\\s\\S]*# Dependency Report)(?=[\\s\\S]*## Dependencies)(?=[\\s\\S]*Serilog\\.Sinks\\.Console)"
        command_timeout: 120
    rubric:
      - "Builds the hierarchy with the built-in TreeNode shape under a [MarkoutSection(Name = \"Dependencies\")]"
      - "Marks the TreeNode list with [MarkoutIgnoreInTable] so it is not mistreated as a table"
      - "Registers the type on a partial MarkoutSerializerContext and serializes through it"
      - "The project builds and prints the tree; does not hand-write the tree"
