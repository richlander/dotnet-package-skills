config:
  max_parallel_scenarios: 1

scenarios:
  # ---------------------------------------------------------------------------
  # T2b — AMBIGUOUS MULTI-PACKAGE TRIAGE (different retrieval DEPTH per package).
  #
  # Same loud load-bearing migration as M1/T1: a real beta4 CLI (vendored
  # ZeroDaySearch) whose System.CommandLine 2.0.0-beta4 API was REMOVED before GA, so
  # the project does not compile until migrated to 3.x — including the silent
  # alias-vs-description trap on `new Option<bool>("--verbose","detailed")`. This needs
  # the FULL System.CommandLine grounding body (the beta->3.x member map + the gotcha).
  #
  # NEW vs T1: the project also has a `sample` command that parses sample.json (camelCase
  # keys) into CveSummary (PascalCase, NO [JsonPropertyName] mappings) using
  # System.Text.Json. STJ is case-SENSITIVE by default, so the naive deserialization
  # binds nothing and silently prints "Sample:  / " — a runtime break the COMPILER
  # CANNOT reveal. The fix is one line (PropertyNameCaseInsensitive = true, or add
  # [JsonPropertyName] mappings), and STJ's one-line frontmatter SUMMARY already states
  # exactly this rule + fix. So System.Text.Json needs only the SUMMARY, not the body.
  #
  # Microsoft.Extensions.AI is referenced and used only benignly (a ChatMessage value in
  # Diagnostics.cs, no IChatClient / no function calling) — its gotcha never fires, so it
  # needs NOTHING (pure skip).
  #
  # Three packages, three retrieval DEPTHS: full body / summary-only / skip. This is the
  # scenario where tool SHAPE should matter:
  #   * single-tool gate (task_type / uncertainty_version): the only channel is the FULL
  #     body, so even confirming STJ's one-line fix costs a full-body pull.
  #   * progressive gate: System.CommandLine -> summarize then full; System.Text.Json ->
  #     summarize only (the summary carries the fix); Microsoft.Extensions.AI -> skip.
  # Win condition: progressive delivers the same task quality with fewer full-body pulls
  # and fewer delivered retrieval tokens. Call behavior (which packages summarized vs
  # fully pulled) is the primary signal; the sample-output assertion is the quality cross-check.
  # ---------------------------------------------------------------------------

  - name: "T2b: modernize a multi-package CLI needing different grounding depth per package"
    prompt: |
      This project (ZeroDaySearch) is a .NET 10 console app that currently does NOT
      build. Bring it up to date so it compiles and behaves correctly.

      Update the project to these package versions and make whatever source changes are
      required to compile against them while preserving all existing behavior:
        - System.CommandLine        -> 3.0.0-preview.5.26302.115
        - System.Text.Json          -> 10.0.0
        - Microsoft.Extensions.AI   -> 9.7.0
        - Newtonsoft.Json           -> 13.0.4

      Preserve every existing command (list, search, severity, product, platform, date,
      summary, sample), their options and arguments, and their option/argument help
      descriptions. The project must compile.

      Additionally, the `sample` command must work correctly: it parses the bundled
      sample.json and must print exactly this line:
          Sample: CVE-2024-0001 / CRITICAL
    setup:
      files:
        - path: ZeroDaySearch.csproj
          source: fixtures/zeroday/ZeroDaySearch.csproj
        - path: Program.cs
          source: fixtures/zeroday/Program.cs
        - path: CveDataSource.cs
          source: fixtures/zeroday/CveDataSource.cs
        - path: CveFormatter.cs
          source: fixtures/zeroday/CveFormatter.cs
        - path: Models.cs
          source: fixtures/zeroday/Models.cs
        - path: Diagnostics.cs
          source: fixtures/zeroday/Diagnostics.cs
        - path: sample.json
          source: fixtures/zeroday/sample.json
    reject_tools:
      - web_search
      - web_fetch
    assertions:
      - type: run_command_and_assert
        command_to_run: "dotnet"
        command_arguments: "build"
        expected_exit_code: 0
        command_timeout: 600
      - type: file_contains
        path: "ZeroDaySearch.csproj"
        value: "3.0.0-preview"
      - type: file_not_contains
        path: "Program.cs"
        value: "SetHandler"
      - type: file_not_contains
        path: "Program.cs"
        value: "AddOption"
      - type: file_not_contains
        path: "Program.cs"
        value: "getDefaultValue"
      # System.Text.Json silent case break: the naive deserialization prints "Sample:  / ".
      # Only the documented STJ case-sensitivity gotcha (summary-level) recovers the values.
      - type: run_command_and_assert
        command_to_run: "dotnet"
        command_arguments: "run --no-build -- sample"
        expected_exit_code: 0
        expected_std_output_matches: "Sample: CVE-2024-0001 / CRITICAL"
        command_timeout: 120
      # Behavior gates for the System.CommandLine migration (deterministic, network-free).
      - type: run_command_and_assert
        command_to_run: "dotnet"
        command_arguments: "run --no-build -- --help"
        expected_exit_code: 0
        expected_std_output_matches: "(?=[\\s\\S]*search <keyword>)(?=[\\s\\S]*severity <level>)(?=[\\s\\S]*product <name>)(?=[\\s\\S]*platform <name>)(?=[\\s\\S]*\\n  list )(?=[\\s\\S]*\\n  date )(?=[\\s\\S]*\\n  summary )(?=[\\s\\S]*\\n  sample )"
        command_timeout: 120
      - type: run_command_and_assert
        command_to_run: "dotnet"
        command_arguments: "run --no-build -- severity"
        expected_exit_code: 1
        expected_std_error_contains: "Required argument 'level' missing"
        command_timeout: 120
      # Silent alias-vs-description gate (System.CommandLine full-body gotcha).
      - type: run_command_and_assert
        command_to_run: "dotnet"
        command_arguments: "run --no-build -- list --help"
        expected_exit_code: 0
        expected_std_output_matches: "--verbose[ \\t]+detailed"
        command_timeout: 120
    rubric:
      - "Bumps System.CommandLine to 3.x in the .csproj and migrates Program.cs to the 3.x API (SetAction/ParseResult.GetValue, Options.Add/Arguments.Add/Subcommands.Add, DefaultValueFactory, Parse(args).Invoke)"
      - "All eight commands and their options/arguments are preserved; the project compiles"
      - "Preserves the --verbose option's description instead of letting the 2nd positional ctor arg become a bogus alias (the System.CommandLine alias-vs-description gotcha)"
      - "Fixes the System.Text.Json case-sensitivity break so the sample command prints 'Sample: CVE-2024-0001 / CRITICAL' (PropertyNameCaseInsensitive or [JsonPropertyName]) — this is a one-line, summary-level fix"
      - "Does NOT add unnecessary changes to the Microsoft.Extensions.AI code in Diagnostics.cs, which already works (it needs no grounding)"
    timeout: 900
