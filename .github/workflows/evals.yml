name: evals

on:
  pull_request:
  workflow_dispatch:

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Read pinned skill-validator commit
        id: pin
        run: echo "sha=$(tr -d '[:space:]' < eng/skill-validator.sha)" >> "$GITHUB_OUTPUT"

      # Build the validator from the pinned dotnet/skills commit, mirroring how
      # dotnet/skills builds it in-repo (dotnet publish SkillValidator.csproj).
      - name: Checkout dotnet/skills @ pinned SHA
        uses: actions/checkout@v4
        with:
          repository: dotnet/skills
          ref: ${{ steps.pin.outputs.sha }}
          path: .tools/skills-src

      - name: Setup .NET (matches dotnet/skills global.json)
        uses: actions/setup-dotnet@v4
        with:
          global-json-file: .tools/skills-src/global.json

      - name: Build skill-validator
        run: |
          dotnet publish .tools/skills-src/eng/skill-validator/src/SkillValidator.csproj \
            -c Release -o .tools/skill-validator \
            -p:NuGetAudit=false

      # The GitHub Copilot SDK that skill-validator uses picks up gh credentials.
      - name: Authenticate gh
        run: echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify generated SKILL.md is in sync
        run: ./eng/grounding sync-skill --check

      - name: Run package-grounding evals
        run: .tools/skill-validator/skill-validator evaluate --tests-dir ./tests ./grounding

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: skill-validator-results
          path: .skill-validator-results/
