name: evals

on:
  pull_request:
  workflow_dispatch:

jobs:
  evaluate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      # The GitHub Copilot SDK that skill-validator uses picks up gh credentials.
      - name: Authenticate gh
        run: echo "${{ secrets.GITHUB_TOKEN }}" | gh auth login --with-token
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Verify generated SKILL.md is in sync
        run: ./eng/sync-skill.sh --check

      - name: Run package-grounding evals
        run: ./eng/run-evals.sh

      - name: Upload results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: skill-validator-results
          path: .skill-validator-results/
